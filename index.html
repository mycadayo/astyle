<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AStyle</title>

    <!-- Bootstrap Icons -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"> 

     <!-- CSS -->
     <link rel="stylesheet" href="css/estilo.css">

</head>

<body>

    <!-- ALT + SHIFT + A -->

    <!-- Cabeçalho -->
    <header>

        <!-- Logo -->
        <div class="header-logo">
            <a href="#home">
                <img src="img/logo.png" alt="" class="logo">
            
            </a>
        </div>

        <!-- Menu Desktop / PC -->
        <nav class="menu-desktop">
            <ul class="menu">
                <li>
                    <!-- Criar Links -->
                    <a href="#home" class="menu-link active">
                        <span class="menu-texto"> Home </span>
                    </a>
                </li>


                <li>
                    <a href="#projetos" class="menu-link">
                        <span class="menu-texto">Projetos</span>
                    </a>
                </li>
                <li>
                    <a href="sobre" class="menu-link">
                        <span class="menu-texto">Sobre</span>
                    </a>
                </li>
                <li>
                    <a href="contato" class="menu-link">
                        <span class="menu-texto">Contato</span>
                    </a>
                </li>


            </ul>

        </nav>

        <!-- Icone Trocar Cor Tema -->
        <div class="header-toggle">

            <!-- Icone Sol ou Lua -->
       <i class="bi bi-sun" id="toggleTheme"></i>

       <!-- Botao Hamburger -->
        <button class="btn-menu-mobile" id="menuHamburger">
            <i class="bi bi-list-stars"></i>
        </button>

        </div>


    </header>

     </body>

    </html>
